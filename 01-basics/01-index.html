<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DOM Basics</title>
        <script>
            function onDivClick(){
                let d = document.getElementById('divGreet');
                d.innerText = 'Hello there!'
            }
            function onDocLoad(){
                let d = document.getElementById('divGreet');
                d.addEventListener('click', onDivClick)
            }
            window.addEventListener('load', onDocLoad)
        </script>
    </head>
    <body>
        <h1>DOM Basics</h1>
        <div id="divGreet">Hi there!</div>
    </body>
</html>
