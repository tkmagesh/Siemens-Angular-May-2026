<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <script>
        (function(){
            let curr = 0;

            function onBtnIncrementClick(){
                curr = curr + 1
                document.getElementById('divCounter').innerText = curr
            }
            function onDocLoad(){
                let btnIncrement = document.getElementById('btnIncrement');
                btnIncrement.addEventListener('click', onBtnIncrementClick)
            }
            window.addEventListener('load', onDocLoad)
        })()
    </script>
</head>
<body>
    <div id="divCounter">0</div>
    <button id="btnIncrement">Increment</button>
</body>
</html>
