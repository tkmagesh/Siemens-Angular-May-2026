<h3>Products</h3>
<hr>
<div>
    <label>New Product :</label>
    <input 
        type="text" 
        [value]="newProductName()" 
        (input)="newProductName.set($any($event.target).value)"
    >
    <button (click)="onAddClick()">Add</button>
</div>
<ul>
    @for (product of (productNames() | slice:pageStart():pageEnd()); track product.id){
        <li>{{product.name}}</li>
    }
</ul>
<div>Page # : {{currPage()}}</div>
<label>Page Size :</label>
<select (input)="pageSize.set($any($event.target).value)">
    <option value="10">10</option>
    <option value="15">15</option>
    <option value="20">20</option>
    <option value="25">25</option>
</select>

<button (click)="currPage.set(currPage() - 1)">Prev</button>
<button (click)="currPage.set(currPage() + 1)">Next</button>
